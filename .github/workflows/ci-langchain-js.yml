name: CI — LangChain JS Integration

on:
  push:
    branches:
      - master
      - main
    paths:
      - '.github/workflows/ci-langchain-js.yml'
      - 'package.json'
      - 'sdk/**'
      - 'integrations/langchain/**'
  pull_request:
    paths:
      - '.github/workflows/ci-langchain-js.yml'
      - 'package.json'
      - 'sdk/**'
      - 'integrations/langchain/**'
  workflow_dispatch:

concurrency:
  group: ci-langchain-js-${{ github.ref }}
  cancel-in-progress: true

jobs:
  langchain-js:
    name: Node 20 - Build SDK & Test LangChain JS Integration
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            sdk/package-lock.json
            integrations/langchain/package-lock.json

      - name: Install SDK dependencies
        run: npm --prefix sdk ci

      - name: Install LangChain integration dependencies
        run: npm --prefix integrations/langchain ci

      - name: Build TypeScript SDK
        run: npm --prefix sdk run build

      - name: Run LangChain integration tests
        run: npm run test:langchain