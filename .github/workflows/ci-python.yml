name: CI — Python SDK & RFC-001 Conformance

on:
  push:
    branches:
      - master
      - main
    paths:
      - "sdk-python/**"
      - "contracts/**"
      - ".github/workflows/ci-python.yml"
  pull_request:
    paths:
      - "sdk-python/**"
      - "contracts/**"
      - ".github/workflows/ci-python.yml"
  workflow_dispatch:

concurrency:
  group: ci-python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-sdk:
    name: Python ${{ matrix.python-version }} - Lint, Type-check, Build, Test & RFC-001 Conformance
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup Node.js
        if: matrix.python-version == '3.12'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Install SDK in dev mode
        working-directory: sdk-python
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install contract dependencies
        if: matrix.python-version == '3.12'
        run: npm --prefix contracts ci

      - name: Lint with ruff
        working-directory: sdk-python
        run: ruff check src/ tests/ scripts/

      - name: Type check with mypy
        working-directory: sdk-python
        run: mypy --strict src/

      - name: Run tests with coverage
        working-directory: sdk-python
        run: pytest --cov=agent_did_sdk --cov-fail-under=85 -q

      - name: Build package
        if: matrix.python-version == '3.12'
        working-directory: sdk-python
        run: |
          pip install build
          python -m build

      - name: Run RFC-001 Python conformance
        if: matrix.python-version == '3.12'
        working-directory: sdk-python
        run: python scripts/conformance_rfc001.py

      - name: Run Python RPC smoke
        if: matrix.python-version == '3.12'
        working-directory: sdk-python
        run: python scripts/rpc_resolver_smoke.py

      - name: Run Python HA smoke
        if: matrix.python-version == '3.12'
        working-directory: sdk-python
        run: python scripts/resolver_ha_smoke.py

      - name: Run Python revocation policy smoke
        if: matrix.python-version == '3.12'
        working-directory: sdk-python
        run: python scripts/revocation_policy_smoke.py

      - name: Run Python E2E smoke
        if: matrix.python-version == '3.12'
        working-directory: sdk-python
        run: python scripts/e2e_smoke.py
